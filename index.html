<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OYAK HORSE | MASTER DASHBOARD</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #f1f5f9; 
        }
        .tab-container { 
            display: flex; 
            background-color: #0b2941; 
            padding: 10px; 
            gap: 10px; 
            flex-shrink: 0; 
            border-bottom: 2px solid #004279;
        }
        .tab-button { 
            background-color: #1e3a8a; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: background-color 0.3s; 
        }
        .tab-button:hover { 
            background-color: #3b82f6; 
        }
        .tab-button.active { 
            background-color: #059669; 
        }
        .content-frame { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div class="tab-container">
        <button class="tab-button active" onclick="loadTab('hse.html', this)">HSE Dashboard</button>
        <button class="tab-button" onclick="loadTab('cevre.html', this)">Çevre Dashboard</button>
        <button class="tab-button" onclick="loadTab('su.html', this)">Su Dashboard</button>
        <button class="tab-button" onclick="loadTab('hsse.html', this)">HSSE Bursa</button>
    </div>
    <iframe id="mainFrame" class="content-frame" src="hse.html"></iframe>

    <script>
        function loadTab(url, element) {
            document.getElementById('mainFrame').src = url;
            let buttons = document.getElementsByClassName('tab-button');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            element.classList.add('active');
        }
    </script>
</body>
</html>
