<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemiz Taşındı | OYAK HORSE HSE</title>
    <!-- 5 sn sonra otomatik yönlendirme (JS kapalıysa da çalışır) -->
    <meta http-equiv="refresh" content="5; url=https://horse-hse.web.app">
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b2941;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 480px;
            width: 100%;
        }
        .logo {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 6px;
        }
        .logo small {
            display: block;
            font-size: 12px;
            letter-spacing: 3px;
            color: #94a3b8;
            font-weight: 600;
            margin-top: 4px;
        }
        h1 {
            font-size: 22px;
            margin: 28px 0 10px;
        }
        p {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 26px;
        }
        a.btn {
            display: inline-block;
            background: #059669;
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            transition: background 0.15s;
        }
        a.btn:hover { background: #047857; }
        .url {
            margin-top: 18px;
            font-size: 13px;
            color: #94a3b8;
        }
        .url a { color: #7dd3fc; }
        .count { color: #64748b; font-size: 12px; margin-top: 22px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">HORSE<small>HSE DASHBOARD</small></div>
        <h1>🚀 Sitemiz yeni adresine taşındı</h1>
        <p>HSE Dashboard artık güvenli yeni adresinde yayında.<br>
           Birkaç saniye içinde otomatik olarak yönlendirileceksiniz.</p>
        <a class="btn" href="https://horse-hse.web.app">Yeni Siteye Git →</a>
        <div class="url">
            Yeni adres: <a href="https://horse-hse.web.app">horse-hse.web.app</a>
        </div>
        <div class="count" id="count">5 saniye içinde yönlendiriliyorsunuz…</div>
    </div>

    <script>
        let s = 5;
        const el = document.getElementById('count');
        const t = setInterval(() => {
            s--;
            if (s <= 0) {
                clearInterval(t);
                window.location.replace('https://horse-hse.web.app');
            } else {
                el.textContent = s + ' saniye içinde yönlendiriliyorsunuz…';
            }
        }, 1000);
    </script>
</body>
</html>
