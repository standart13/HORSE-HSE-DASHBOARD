<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OYAK HORSE | MASTER DASHBOARD</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #f1f5f9; 
        }
        .top-bar { 
            display: flex; 
            align-items: center;
            background-color: #0b2941; 
            padding: 8px 16px; 
            flex-shrink: 0; 
            border-bottom: 2px solid #004279;
            color: white;
            height: 30px;
        }
        .menu-button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin-right: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-title {
            font-size: 14px;
            font-weight: bold;
        }
        .sidebar {
            position: fixed;
            top: 48px;
            left: -250px;
            width: 220px;
            height: calc(100vh - 48px);
            background-color: #0b2941;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding-top: 10px;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }
        .sidebar.open {
            left: 0;
        }
        .tab-button { 
            background-color: transparent; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            cursor: pointer; 
            text-align: left;
            font-weight: bold; 
            transition: background-color 0.2s; 
            border-left: 4px solid transparent;
            font-size: 14px;
        }
        .tab-button:hover { 
            background-color: #1e3a8a; 
        }
        .tab-button.active { 
            background-color: #1e3a8a; 
            border-left: 4px solid #059669;
        }
        .content-frame { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            height: 100%; 
        }
        .overlay {
            position: fixed;
            top: 48px;
            left: 0;
            width: 100%;
            height: calc(100vh - 48px);
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 999;
        }
        .overlay.open {
            display: block;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="menu-button" onclick="toggleMenu()">&#9776;</button>
        <div class="brand-title">OYAK HORSE | MASTER DASHBOARD</div>
    </div>
    
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <button class="tab-button active" onclick="loadTab('hse.html', this)">HSE Dashboard</button>
        <button class="tab-button" onclick="loadTab('cevre.html', this)">Çevre Dashboard</button>
        <button class="tab-button" onclick="loadTab('su.html', this)">Su Dashboard</button>
        <button class="tab-button" onclick="loadTab('hsse.html', this)">HSSE Bursa</button>
    </div>

    <iframe id="mainFrame" class="content-frame" src="hse.html"></iframe>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function loadTab(url, element) {
            document.getElementById('mainFrame').src = url;
            let buttons = document.getElementsByClassName('tab-button');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            element.classList.add('active');
            toggleMenu(); 
        }
    </script>
</body>
</html>
