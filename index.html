<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #f1f5f9; 
            font-family: sans-serif;
        }
        .menu-button {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            background: rgba(11, 41, 65, 0.8);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .menu-button:hover {
            opacity: 1;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -220px;
            width: 220px;
            height: 100vh;
            background-color: #0b2941;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }
        .sidebar.open {
            left: 0;
        }
        .tab-button { 
            background-color: transparent; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            cursor: pointer; 
            text-align: left;
            font-weight: bold; 
            border-left: 4px solid transparent;
            font-size: 14px;
        }
        .tab-button.active { 
            background-color: #1e3a8a; 
            border-left: 4px solid #059669;
        }
        .content-frame { 
            border: none; 
            width: 100vw; 
            height: 100vh; 
            display: block;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 999;
        }
        .overlay.open {
            display: block;
        }
    </style>
</head>
<body>
    <button class="menu-button" onclick="toggleMenu()">&#9776;</button>
    
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <button class="tab-button active" onclick="loadTab('hse.html', this)">HSE Dashboard</button>
        <button class="tab-button" onclick="loadTab('cevre.html', this)">Çevre Dashboard</button>
        <button class="tab-button" onclick="loadTab('su.html', this)">Su Dashboard</button>
        <button class="tab-button" onclick="loadTab('hsse.html', this)">HSSE Bursa</button>
    </div>

    <iframe id="mainFrame" class="content-frame" src="hse.html"></iframe>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function loadTab(url, element) {
            document.getElementById('mainFrame').src = url;
            let buttons = document.getElementsByClassName('tab-button');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            element.classList.add('active');
            toggleMenu(); 
        }
    </script>
</body>
</html>
